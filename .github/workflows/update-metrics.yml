name: Update TnT Metrics

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 08:00 Валенсия
  workflow_dispatch:       # ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # нужно для коммита metrics.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Trello metrics
        env:
          TRELLO_API_KEY:  ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN:    ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_IDS: ${{ secrets.TRELLO_BOARD_IDS }}
        run: node scripts/fetch-metrics.js

      - name: Commit and push metrics.json
        run: |
          git config user.name "tnt-bot"
          git config user.email "bot@truckntraceops.com"
          git add public/metrics.json
          git diff --staged --quiet || git commit -m "chore: update metrics $(date +'%Y-%m-%d')"
          git push
